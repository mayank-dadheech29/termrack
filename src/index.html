<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Termrack</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="brand">Termrack</span>
        <button id="new-session" title="New terminal (⌘T)">+</button>
      </div>
      <div id="timer" data-mode="focus">
        <span id="timer-mode">Focus</span>
        <span id="timer-display">25:00</span>
        <div id="timer-controls">
          <button id="timer-toggle" title="Start / Pause">▶</button>
          <button id="timer-reset" title="Reset">↺</button>
          <button id="timer-skip" title="Skip to next phase">⤳</button>
        </div>
      </div>
      <ul id="session-list"></ul>
    </aside>
    <div id="resizer" title="Drag to resize"></div>
    <main id="main">
      <div id="findbar" hidden>
        <input id="find-input" type="text" placeholder="Find" spellcheck="false" />
        <span id="find-count"></span>
        <button id="find-prev" title="Previous (⇧⏎)">↑</button>
        <button id="find-next" title="Next (⏎)">↓</button>
        <button id="find-close" title="Close (esc)">×</button>
      </div>
      <div id="terminals"></div>
      <div id="empty-state">No terminals. Press <kbd>+</kbd> or <kbd>⌘T</kbd> to start one.</div>
    </main>
  </div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
