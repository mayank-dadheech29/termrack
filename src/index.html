<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' file: blob: https:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; img-src 'self' data:;" />
  <title>Termrack</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="brand">Termrack</span>
        <button id="new-session" title="New terminal (⌘T)">+</button>
      </div>
      <div id="tools">
        <button id="tools-toggle">
          <span class="chev">▾</span>
          <span>Tools</span>
        </button>
        <div id="tools-body">
          <div id="timer" data-mode="focus">
            <span id="timer-mode">Focus</span>
            <span id="timer-display" title="Click to edit minutes (when stopped)">25:00</span>
            <div id="timer-controls">
              <button id="timer-toggle" title="Start / Pause">▶</button>
              <button id="timer-reset" title="Reset">↺</button>
              <button id="timer-skip" title="Skip to next phase">⤳</button>
            </div>
            <span id="timer-today">🍅 0 today</span>
          </div>
          <div id="music">
            <div class="music-top">
              <button id="music-toggle" title="Play / Pause">▶</button>
              <input id="music-input" type="text" spellcheck="false"
                     placeholder="Audio file or URL (incl. YouTube)" />
              <button id="music-pick" title="Choose audio file">📁</button>
              <button id="music-lib" title="Saved tracks">≡</button>
            </div>
            <div class="music-bottom">
              <input id="music-vol" type="range" min="0" max="100" />
              <span id="music-status"></span>
            </div>
            <div id="music-dock" title="Dock / size the video">
              <button data-corner="tl" title="Top-left">◰</button>
              <button data-corner="tr" title="Top-right">◳</button>
              <button data-corner="bl" title="Bottom-left">◱</button>
              <button data-corner="br" title="Bottom-right">◲</button>
              <span class="md-sep"></span>
              <button id="yt-min" title="Minimize / restore video">—</button>
              <button id="yt-smaller" title="Smaller">－</button>
              <button id="yt-larger" title="Larger">＋</button>
            </div>
            <div id="music-yt"></div>
            <input id="music-file" type="file" accept="audio/*" hidden />
          </div>
        </div>
      </div>
      <ul id="session-list"></ul>
    </aside>
    <div id="resizer" title="Drag to resize"></div>
    <main id="main">
      <div id="topbar-drag"></div>
      <div id="findbar" hidden>
        <input id="find-input" type="text" placeholder="Find" spellcheck="false" />
        <span id="find-count"></span>
        <button id="find-prev" title="Previous (⇧⏎)">↑</button>
        <button id="find-next" title="Next (⏎)">↓</button>
        <button id="find-close" title="Close (esc)">×</button>
      </div>
      <div id="terminals"></div>
      <div id="empty-state">No terminals. Press <kbd>+</kbd> or <kbd>⌘T</kbd> to start one.</div>
    </main>
  </div>

  <div id="tracks-overlay" hidden>
    <div id="tracks">
      <div class="settings-title">Saved Tracks</div>
      <ul id="tracks-list"></ul>
      <div id="tracks-empty" hidden>No saved tracks — add one below.</div>
      <div class="snip-add">
        <input id="track-name" type="text" placeholder="Name (e.g. Lofi beats)" />
        <input id="track-url" type="text" spellcheck="false" placeholder="YouTube / audio URL or file path" />
        <button id="track-cur" class="settings-btn" title="Use the source currently in the player">Current</button>
        <button id="track-add-btn" class="settings-btn">Add</button>
      </div>
      <div class="settings-actions"><button id="tracks-done">Done</button></div>
    </div>
  </div>

  <div id="snip-overlay" hidden>
    <div id="snip">
      <div class="settings-title">Saved Commands</div>
      <ul id="snip-list"></ul>
      <div id="snip-empty" hidden>No saved commands yet — add one below.</div>
      <div class="snip-add">
        <input id="snip-name" type="text" placeholder="Name (e.g. Start dev server)" />
        <input id="snip-cmd" type="text" spellcheck="false" placeholder="Command (e.g. npm run dev)" />
        <button id="snip-add-btn" class="settings-btn">Add</button>
      </div>
      <div class="settings-actions"><button id="snip-done">Done</button></div>
    </div>
  </div>

  <div id="palette-overlay" hidden>
    <div id="palette">
      <input id="palette-input" type="text" placeholder="Type a command…" spellcheck="false" />
      <ul id="palette-list"></ul>
    </div>
  </div>

  <div id="settings-overlay" hidden>
    <div id="settings">
      <div class="settings-title">Settings</div>
      <div class="settings-row">
        <label for="set-theme">Theme</label>
        <select id="set-theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="midnight">Midnight</option>
          <option value="solarized">Solarized</option>
        </select>
      </div>
      <div class="settings-row">
        <label for="set-accent">Accent color</label>
        <input type="color" id="set-accent" />
      </div>
      <div class="settings-row">
        <label for="set-fg">Terminal text</label>
        <input type="color" id="set-fg" />
      </div>
      <div class="settings-row">
        <label for="set-bg">Terminal background</label>
        <input type="color" id="set-bg" />
      </div>
      <div class="settings-row">
        <label>Terminal colors</label>
        <button id="set-colors-reset" class="settings-btn">Reset to theme</button>
      </div>
      <div class="settings-row">
        <label for="set-fontfamily">Font</label>
        <select id="set-fontfamily">
          <option value="Menlo, monospace">Menlo</option>
          <option value="&quot;SF Mono&quot;, monospace">SF Mono</option>
          <option value="Monaco, monospace">Monaco</option>
          <option value="&quot;JetBrains Mono&quot;, monospace">JetBrains Mono</option>
          <option value="&quot;Fira Code&quot;, monospace">Fira Code</option>
          <option value="&quot;Courier New&quot;, monospace">Courier New</option>
        </select>
      </div>
      <div class="settings-row">
        <label for="set-fontsize">Font size</label>
        <input type="number" id="set-fontsize" min="8" max="28" />
      </div>
      <div class="settings-row">
        <label for="set-scrollback">Scrollback (lines)</label>
        <input type="number" id="set-scrollback" min="100" max="100000" step="100" />
      </div>
      <div class="settings-row">
        <label for="set-cursorblink">Cursor blink</label>
        <input type="checkbox" id="set-cursorblink" />
      </div>
      <div class="settings-sep"></div>
      <div class="settings-row">
        <label for="set-tfocus">Focus minutes</label>
        <input type="number" id="set-tfocus" min="1" max="180" />
      </div>
      <div class="settings-row">
        <label for="set-tshort">Short break</label>
        <input type="number" id="set-tshort" min="1" max="180" />
      </div>
      <div class="settings-row">
        <label for="set-tlong">Long break</label>
        <input type="number" id="set-tlong" min="1" max="180" />
      </div>
      <div class="settings-actions">
        <button id="settings-done">Done</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
